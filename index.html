<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Média</title>
</head>
<body>
    <h1>Cálculo de Média</h1>
    <input type="text" id="N1" placeholder="Nota 1">
    <input type="text" id="N2" placeholder="Nota 2">
    
    <button onclick="calcularMedia()">Calcular</button>

    <div id="resultado"></div>

<script>
    function calcularMedia() {
        let input1 = document.getElementById("N1").value;
        let input2 = document.getElementById("N2").value;
        
        let n1 = parseFloat(input1);
        let n2 = parseFloat(input2);
        let divResultado = document.getElementById("resultado");

        if (input1 === "" || input2 === "") {
            divResultado.innerText = "Preencha todas as notas.";
            return;
        }

        if (isNaN(n1) || isNaN(n2)) {
            divResultado.innerText = "Apenas números válidos.";
            return;
        }

        if (n1 < 0 || n1 > 10 || n2 < 0 || n2 > 10) {
            divResultado.innerText = "Apenas notas entre 0 e 10!";
            return;
        }

        let media = (n1 + n2) / 2;
        let situacao = "";

        if (media >= 7) {
            situacao = "Aprovado!";
        } else if (media >= 5) {
            situacao = "Recuperação";
        } else {
            situacao = "Reprovado...";
        }

        divResultado.innerHTML = `Média: ${media.toFixed(1)} <br> Situação: ${situacao}`;
    }
</script>
</body>
</html>
